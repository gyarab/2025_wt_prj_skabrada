<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>API Playground</title>
</head>
<body>

<h1>API Playground</h1>

<input type="number" id="colorId" placeholder="ID barvy">
<button id="loadButton">Načíst barvu</button>

<div id="result"></div>

<script>

const button = document.getElementById("loadButton");

button.addEventListener("click", async () => {

    const id = document.getElementById("colorId").value;

    try {

        const response = await fetch(`/api/color/${id}`);

        if (!response.ok) {
            throw new Error("Barva nenalezena");
        }

        const data = await response.json();

        const result = document.getElementById("result");

        result.innerHTML = `
            <h2>${data.name}</h2>

            <div style="
                width:200px;
                height:100px;
                background:${data.hex_id};
                border:1px solid black;
            "></div>

            <p>HEX: ${data.hex_id}</p>
            <p>${data.info_misc || ""}</p>
        `;

    } catch (error) {

        document.getElementById("result").innerHTML =
            `<p>${error}</p>`;

    }

});

</script>

</body>
</html>
